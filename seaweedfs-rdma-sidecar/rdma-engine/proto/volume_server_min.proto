syntax = "proto3";

package volume_server_pb;

service VolumeServer {
  rpc ReadNeedleRange (ReadNeedleRangeRequest) returns (ReadNeedleRangeResponse);
  rpc WriteNeedleBlob (WriteNeedleBlobRequest) returns (WriteNeedleBlobResponse);
}

message ReadNeedleRangeRequest {
  uint32 volume_id = 1;
  uint64 needle_id = 2;
  uint32 cookie = 3;
  uint64 offset = 4;
  uint64 size = 5;
}

message ReadNeedleRangeResponse {
  bytes data = 1;
}

message WriteNeedleBlobRequest {
  uint32 volume_id = 1;
  uint64 needle_id = 2;
  int32 size = 3;
  bytes needle_blob = 4;
}

message WriteNeedleBlobResponse {
}
